name: .NET Build Check

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    # Step 1: Get your code
    - uses: actions/checkout@v3

    # Step 2: Set up MSBuild
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    # Step 3: Setup NuGet
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1

    # Step 4: Restore NuGet packages using the correct path
    - name: Restore NuGet packages
      run: nuget restore CybersecurityChatbot.slnx

    # Step 5: Build using the correct path
    - name: Build with MSBuild
      run: msbuild CybersecurityChatbot.slnx /p:Configuration=Release
